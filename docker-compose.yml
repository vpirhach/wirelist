services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wirelist-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: wirelist_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - wirelist-network

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wirelist-api
    environment:
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/wirelist_db
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - wirelist-network

  # Vue.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: wirelist-web
    environment:
      VITE_API_BASE_URL_V2: http://localhost:3002
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - wirelist-network

networks:
  wirelist-network:
    external: true

volumes:
  postgres_data:

