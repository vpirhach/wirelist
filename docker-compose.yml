services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: wirelist-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: wirelist_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wirelist-network

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wirelist-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:mysecretpassword@postgres:5432/wirelist_db?schema=public
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      PORT: 3002
      CORS_ORIGINS: http://localhost,http://172.18.12.93
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - wirelist-network

  # Vue.js Frontend (nginx)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL_V2: ""
    container_name: wirelist-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - wirelist-network

networks:
  wirelist-network:
    driver: bridge

volumes:
  postgres_data:

