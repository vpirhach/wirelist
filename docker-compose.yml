version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wirelist-db
    environment:
      POSTGRES_USER: wirelist
      POSTGRES_PASSWORD: wirelist
      POSTGRES_DB: wirelist
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wirelist"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: wirelist-api
    environment:
      DATABASE_URL: postgresql://wirelist:wirelist@postgres:5432/wirelist
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1h}
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # Vue.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: wirelist-web
    environment:
      VITE_API_BASE_URL_V2: http://localhost:3002
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:

