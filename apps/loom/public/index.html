<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loom — Wire list extraction</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Loom</h1>
      <p class="muted">Upload <code>.doc</code> / <code>.docx</code> wire lists. One JSON artifact per batch for DB import.</p>
      <p><a href="/meta">Service metadata (JSON)</a></p>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>New upload</h2>
        <form id="upload-form">
          <label class="file-label">
            <span>Select files</span>
            <input
              type="file"
              name="files"
              id="file-input"
              multiple
              accept=".doc,.docx,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
          </label>
          <ul id="selected-files" class="file-list hidden"></ul>
          <button type="submit" id="submit-btn" disabled>Start extraction</button>
        </form>
        <p id="upload-error" class="error hidden" role="alert"></p>
      </section>

      <section class="panel">
        <h2>Current session</h2>
        <div id="session-empty" class="muted">No active session. Upload files to begin.</div>
        <div id="session-active" class="hidden">
          <p>
            <strong>Session</strong> <code id="session-id"></code>
            <span id="session-status" class="badge"></span>
          </p>
          <p class="muted" id="session-summary"></p>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>File</th>
                  <th>Status</th>
                  <th>Time</th>
                  <th>Detail</th>
                </tr>
              </thead>
              <tbody id="session-files"></tbody>
            </table>
          </div>
          <div class="actions">
            <a id="download-json" class="button" href="#" download>Download session JSON (import)</a>
            <button type="button" id="copy-json" class="button secondary">
              Copy output JSON
            </button>
          </div>
          <p id="session-wait" class="muted hidden">Processing…</p>
        </div>
      </section>

      <section class="panel">
        <h2>Past sessions</h2>
        <button type="button" id="refresh-list" class="button secondary">Refresh</button>
        <ul id="past-sessions" class="past-list"></ul>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
